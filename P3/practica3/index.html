<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invasión Alienígena: Canva Centauri</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-overlay">
            <div id="score">PUNTOS: 0</div>
            <div id="energy-container">
                <div id="energy-bar"></div>
            </div>
            <div id="lives">VIDAS: ❤️❤️❤️</div>
        </div>
    </div>

    <div id="mobile-controls">
        <div class="movement-btns">
            <button id="btn-left">Ç</button>
            <button id="btn-right">È</button>
        </div>
        <button id="btn-shoot">¿</button>
    </div>

    <button id="play-again-btn">JUGAR DE NUEVO</button>

    <script src="script.js"></script>
</body>
</html>
